<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - Nexus Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Segoe UI"', 'sans-serif'] },
                    colors: {
                        ms: { blue: '#0078D4', blueHover: '#106EBE', gray10: '#FAF9F8', gray20: '#F3F2F1', gray30: '#EDEBE9', gray40: '#E1DFDD', gray130: '#605E5C', gray160: '#323130', gray190: '#201F1E' }
                    }
                }
            }
        }
    </script>
    <style>
        .ms-btn-primary {
            background-color: #0078D4;
            color: white;
            border: none;
            border-radius: 2px;
            transition: background-color 0.1s;
        }

        .ms-btn-primary:hover {
            background-color: #106EBE;
        }

        .ms-input {
            border: 1px solid #8A8886;
            border-radius: 2px;
            padding: 6px 12px;
            transition: border-color 0.1s;
        }

        .ms-input:focus {
            outline: none;
            border-color: #0078D4;
        }
    </style>
</head>

<body class="bg-white text-ms-gray160 min-h-screen flex flex-col font-sans text-[15px]">

    <!-- Header -->
    <header class="bg-white border-b border-ms-gray40 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-[48px]">
                <div class="flex items-center gap-6">
                    <a href="index.html"
                        class="flex items-center gap-2 cursor-pointer select-none no-underline outline-none focus-visible:ring-2 focus-visible:ring-ms-blue focus-visible:ring-offset-2">
                        <i class="fas fa-cube text-ms-blue text-xl"></i>
                        <span class="font-semibold text-[16px] text-ms-gray160">Nexus Store</span>
                    </a>
                </div>

                <div class="flex items-center gap-2 text-sm">
                    <div id="auth-links" class="flex items-center space-x-1"></div>
                    <div class="h-6 w-px bg-ms-gray40 mx-2"></div>
                    <a href="cart.html"
                        class="relative p-2 text-ms-gray160 hover:bg-ms-gray20 transition-colors flex items-center justify-center rounded-sm">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count"
                            class="absolute top-1 right-1 bg-ms-blue text-white text-[10px] font-bold px-1 rounded-full min-w-[14px] text-center hidden leading-[14px]">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-[1100px] mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full relative z-10">
        <div class="mb-4">
            <a href="index.html" class="text-ms-blue hover:underline text-sm font-medium"><i
                    class="fas fa-arrow-left mr-1"></i> Back to Products</a>
        </div>

        <div id="loader" class="flex justify-center items-center py-20">
            <i class="fas fa-circle-notch fa-spin text-2xl text-ms-blue"></i>
        </div>

        <div id="error-state" class="text-center py-20 hidden">
            <h3 class="text-xl font-semibold text-[#A4262C]">Product not found</h3>
        </div>

        <div id="product-content" class="grid grid-cols-1 md:grid-cols-2 gap-12 hidden mt-6">
            <!-- Image Area -->
            <div class="bg-ms-gray10 flex items-center justify-center min-h-[400px] border border-ms-gray30">
                <div id="product-image-container"
                    class="text-ms-gray40 text-center w-full h-full flex items-center justify-center p-8">
                    <i class="fas fa-box-open text-9xl"></i>
                </div>
            </div>

            <!-- Details Area -->
            <div class="flex flex-col pt-2">
                <div class="mb-2" id="stock-badge"></div>
                <h1 id="product-name" class="text-3xl font-semibold text-ms-gray190 mb-2 tracking-tight">Loading...</h1>
                <p id="product-price" class="text-2xl font-bold text-ms-gray160 mb-6">...</p>

                <div class="mb-8">
                    <h3 class="text-[14px] font-semibold text-ms-gray160 mb-2 uppercase tracking-wide">Description</h3>
                    <p id="product-desc" class="text-[15px] text-ms-gray130 leading-relaxed">...</p>
                </div>

                <div class="bg-ms-gray10 p-6 border border-ms-gray30 mt-auto">
                    <div class="flex items-center gap-4 mb-6">
                        <label class="font-semibold text-ms-gray160">Qty</label>
                        <div class="flex items-center border border-ms-gray40 bg-white shadow-sm">
                            <button id="qty-dec"
                                class="px-4 py-2 text-ms-gray160 hover:bg-ms-gray20 transition-colors border-r border-ms-gray40"><i
                                    class="fas fa-minus text-xs"></i></button>
                            <input type="number" id="qty-input" value="1" min="1"
                                class="w-16 bg-transparent text-center font-semibold outline-none py-2 text-[15px]">
                            <button id="qty-inc"
                                class="px-4 py-2 text-ms-gray160 hover:bg-ms-gray20 transition-colors border-l border-ms-gray40"><i
                                    class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>

                    <button id="add-to-cart-btn"
                        class="w-full ms-btn-primary py-3 font-semibold text-[15px] flex justify-center items-center shadow-sm">
                        <span>Add to Cart</span>
                    </button>

                    <!-- Toast msg -->
                    <div id="toast"
                        class="mt-4 p-3 bg-[#DFF6DD] border border-[#107C10] text-[#107C10] font-medium text-sm hidden flex items-center">
                        <i class="fas fa-check-circle mr-2"></i> <span id="toast-msg">Added to cart successfully</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-ms-gray10 border-t border-ms-gray40 py-8">
        <div class="max-w-[1600px] mx-auto px-4 text-center text-xs text-ms-gray130">
            &copy; 2026 Nexus Store Inc. All rights reserved.
        </div>
    </footer>

    <script src="env.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const loader = document.getElementById('loader');
            const content = document.getElementById('product-content');
            const errorState = document.getElementById('error-state');

            if (!productId) {
                loader.classList.add('hidden'); errorState.classList.remove('hidden'); return;
            }

            try {
                const p = await api.getProduct(productId);
                loader.classList.add('hidden'); content.classList.remove('hidden');

                document.getElementById('product-name').textContent = p.name;
                document.getElementById('product-price').textContent = formatCurrency(p.price);
                document.getElementById('product-desc').textContent = p.description;
                document.title = `${p.name} - Nexus Store`;

                if (p.image) {
                    document.getElementById('product-image-container').innerHTML = `<img src="${p.image}" alt="${p.name}" class="object-contain h-full w-full">`;
                }

                if (p.stock === 0) {
                    document.getElementById('stock-badge').innerHTML = `<span class="bg-[#FDE7E9] text-[#A4262C] font-semibold px-2 py-0.5 text-xs inline-block">Out of stock</span>`;
                    document.getElementById('add-to-cart-btn').disabled = true;
                    document.getElementById('add-to-cart-btn').classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    document.getElementById('stock-badge').innerHTML = `<span class="bg-[#DFF6DD] text-[#107C10] font-semibold px-2 py-0.5 text-xs inline-block">In stock</span>`;
                }

                const qtyInput = document.getElementById('qty-input');
                document.getElementById('qty-dec').addEventListener('click', () => {
                    let val = parseInt(qtyInput.value);
                    if (val > 1) qtyInput.value = val - 1;
                });
                document.getElementById('qty-inc').addEventListener('click', () => {
                    let val = parseInt(qtyInput.value);
                    if (val < (p.stock || 99)) qtyInput.value = val + 1;
                });

                document.getElementById('add-to-cart-btn').addEventListener('click', async () => {
                    if (!state.token) { window.location.href = `login.html?redirect=product?id=${p.id}`; return; }

                    const btn = document.getElementById('add-to-cart-btn');
                    btn.disabled = true; btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>`;

                    try {
                        let val = parseInt(qtyInput.value);
                        await api.updateCart(p.id, val);
                        updateCartCount();

                        const toast = document.getElementById('toast');
                        document.getElementById('toast-msg').textContent = `Added ${val} x ${p.name} to cart`;
                        toast.classList.remove('hidden');
                        setTimeout(() => toast.classList.add('hidden'), 3000);
                    } catch (err) {
                        alert(err.message || 'Failed to add to cart');
                    } finally {
                        btn.disabled = false; btn.innerHTML = `<span>Add to Cart</span>`;
                    }
                });
            } catch (err) {
                console.error(err);
                loader.classList.add('hidden'); errorState.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
